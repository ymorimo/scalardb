name: Vulnerability Check

on:
  workflow_call:
    inputs:
      target-ref:
        description: 'Target ref (branch, tag, release) to scan'
        required: true
        type: string
        default: 'main'
      find-latest-release:
        description: 'Flag to find the latest version for specified `target-ref`'
        required: false
        type: boolean
        default: false
    secrets:
      CR_PAT:
        required: true
      SLACK_SECURITY_WEBHOOK_URL:
        required: false

jobs:
  vuln-check:
    runs-on: ubuntu-latest

    steps:
      - name: Build docker image
        id: build-docker-image
        # uses: scalar-labs/actions/.github/actions/gradlew-docker@main
        uses: ymorimo/scalar-actions/.github/actions/gradlew-docker@main
        with:
          target-ref: ${{ inputs.target-ref }}
          find-latest-release: ${{ inputs.find-latest-release }}
          version-command: "./gradlew :core:properties -q | grep version: | awk '{print $2}'"

